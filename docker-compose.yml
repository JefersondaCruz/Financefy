
services:
  application:
    build:
      context: ./application
      dockerfile: Dockerfile
    container_name: application_app
    env_file:
      - ./application/.env
    ports:
      - "8000:8000"
    volumes:
      - ./application:/var/www/html
    depends_on:
      - postgres
    command: sh -c "composer install && php artisan config:clear && php artisan serve --host=0.0.0.0 --port=8000"
    networks:
      - backend_net
      - frontend_net
    profiles: ["app", "front", "all"]

  postgres:
    image: postgres:16-alpine 
    container_name: postgres_db
    restart: always
    env_file:
      - ./application/.env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    networks:
      - backend_net
  
  redis:
    image: redis:7-alpine
    container_name: redis_cache
    restart: always
    ports:
      - "6379:6379"
    networks:
      - backend_net

  n8n:
    image: n8nio/n8n:stable
    container_name: n8n_app
    restart: always
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - backend_net

  vue:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vue_app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0
    networks:
      - frontend_net
    profiles: ["front", "all"]

volumes:
  postgres_data:
  n8n_data:

networks:
  backend_net:
  frontend_net:
